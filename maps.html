<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mekan Yorum Analizörü</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --text-dark: #1f2937;
            --border: #e5e7eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; color: var(--primary); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .settings-box {
            background-color: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .results {
            margin-top: 30px;
            display: none;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .card {
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .card.best { border-top: 4px solid var(--success); }
        .card.mid { border-top: 4px solid var(--warning); }
        .card.worst { border-top: 4px solid var(--danger); }
        .card h3 { margin-top: 0; font-size: 18px; }
        ul { padding-left: 20px; margin-bottom: 0; }
        li { margin-bottom: 5px; }
        #loading { text-align: center; margin-top: 20px; display: none; font-weight: bold; color: var(--primary); }
        .raw-reviews { margin-top: 30px; font-size: 13px; color: #6b7280; border-top: 1px solid var(--border); padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍽️ Harita Yorum Analizörü</h1>
    
    <div class="settings-box">
        <div class="form-group">
            <label for="googleApiKey">Google Maps API Key (Places API aktif olmalı):</label>
            <input type="password" id="googleApiKey" placeholder="AIzaSy...">
        </div>
        <div class="form-group">
            <label for="geminiApiKey">Google Gemini API Key (Ücretsiz AI Analizi için):</label>
            <input type="password" id="geminiApiKey" placeholder="AIzaSy...">
        </div>
    </div>

    <div class="form-group">
        <label for="placeInput">Mekan Adı veya Uzun Google Haritalar URL'si:</label>
        <input type="text" id="placeInput" placeholder="Örn: Nusret Ankara veya https://www.google.com/maps/place/...">
    </div>

    <button id="analyzeBtn" onclick="startProcess()">Yorumları Çek ve Analiz Et</button>
    <div id="loading">İşlem yapılıyor, lütfen bekleyin... Yorumlar çekiliyor ve yapay zeka tarafından analiz ediliyor.</div>

    <div class="results" id="resultsArea">
        <h2>📊 Analiz Sonuçları</h2>
        <h4 id="placeNameDisplay" style="color: #4b5563; margin-top: -10px;"></h4>
        
        <div class="category-grid">
            <div class="card best">
                <h3>🏆 En İyiler (Övgü Alanlar)</h3>
                <div id="bestContent"></div>
            </div>
            <div class="card mid">
                <h3>😐 Ortalar (Karışık Yorumlar)</h3>
                <div id="midContent"></div>
            </div>
            <div class="card worst">
                <h3>🛑 En Kötüler (Şikayet Edilenler)</h3>
                <div id="worstContent"></div>
            </div>
        </div>

        <div class="raw-reviews">
            <strong>Analiz Edilen Ham Yorumlar:</strong>
            <ul id="rawReviewsList"></ul>
        </div>
    </div>
</div>

<script>
    let mapService;

    // Harita kütüphanesini dinamik yükleme
    function loadGoogleMapsScript(apiKey) {
        return new Promise((resolve, reject) => {
            if (window.google && window.google.maps) {
                resolve();
                return;
            }
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places`;
            script.async = true;
            script.defer = true;
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
        });
    }

    async function startProcess() {
        const googleKey = document.getElementById('googleApiKey').value.trim();
        const geminiKey = document.getElementById('geminiApiKey').value.trim();
        const inputVal = document.getElementById('placeInput').value.trim();

        if (!googleKey || !geminiKey || !inputVal) {
            alert("Lütfen tüm API anahtarlarını ve mekan bilgisini doldurun.");
            return;
        }

        document.getElementById('analyzeBtn').disabled = true;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultsArea').style.display = 'none';

        try {
            await loadGoogleMapsScript(googleKey);
            
            // Gizli bir div oluşturup Google Places servisini başlatıyoruz
            const hiddenMap = document.createElement('div');
            mapService = new google.maps.places.PlacesService(hiddenMap);

            // Girdiyi analiz et (URL mi yoksa isim mi?)
            let searchQuery = inputVal;
            if (inputVal.includes("google.com/maps/place/")) {
                const urlParts = inputVal.split("/place/")[1].split("/")[0];
                searchQuery = decodeURIComponent(urlParts.replace(/\+/g, ' '));
            }

            // 1. Mekanı Ara
            const placeId = await searchPlace(searchQuery);
            if (!placeId) throw new Error("Mekan bulunamadı.");

            // 2. Yorumları Çek
            const placeDetails = await getPlaceDetails(placeId);
            const reviews = placeDetails.reviews || [];
            
            if (reviews.length === 0) {
                throw new Error("Bu mekan için hiç yorum bulunamadı.");
            }

            document.getElementById('placeNameDisplay').innerText = `Mekan: ${placeDetails.name} (${reviews.length} yorum bulundu)`;
            
            // Yorumları metne çevir ve arayüze ekle
            const reviewsText = reviews.map(r => r.text).join("\n---\n");
            document.getElementById('rawReviewsList').innerHTML = reviews.map(r => `<li>${r.text}</li>`).join("");

            // 3. Gemini ile Analiz Et
            await analyzeWithGemini(geminiKey, reviewsText);

        } catch (error) {
            alert("Bir hata oluştu: " + error.message);
            console.error(error);
        } finally {
            document.getElementById('analyzeBtn').disabled = false;
            document.getElementById('loading').style.display = 'none';
        }
    }

    function searchPlace(query) {
        return new Promise((resolve, reject) => {
            const request = { query: query, fields: ['name', 'place_id'] };
            mapService.findPlaceFromQuery(request, (results, status) => {
                if (status === google.maps.places.PlacesServiceStatus.OK && results.length > 0) {
                    resolve(results[0].place_id);
                } else {
                    reject(new Error("Mekan araması başarısız oldu."));
                }
            });
        });
    }

    function getPlaceDetails(placeId) {
        return new Promise((resolve, reject) => {
            const request = { placeId: placeId, fields: ['name', 'reviews'] };
            mapService.getDetails(request, (place, status) => {
                if (status === google.maps.places.PlacesServiceStatus.OK) {
                    resolve(place);
                } else {
                    reject(new Error("Mekan detayları alınamadı."));
                }
            });
        });
    }

    async function analyzeWithGemini(apiKey, reviewsText) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        
        const prompt = `
        Aşağıdaki müşteri yorumlarını analiz et. Menüde geçen yiyecekleri, içecekleri ve tatlıları tespit et.
        Müşterilerin duygu durumuna göre bunları "En İyi", "Orta" ve "En Kötü" olarak kategorize et.
        Eğer bir kategori için veri yoksa boş dizi [] döndür.
        
        KESİNLİKLE SADECE GEÇERLİ BİR JSON DÖNDÜR, BAŞKA METİN VEYA MARKDOWN (```json) KULLANMA.
        
        JSON Formatı şu şekilde olmalı:
        {
            "en_iyi": { "yiyecekler": [], "icecekler": [], "tatlilar": [] },
            "orta": { "yiyecekler": [], "icecekler": [], "tatlilar": [] },
            "en_kotu": { "yiyecekler": [], "icecekler": [], "tatlilar": [] }
        }

        Müşteri Yorumları:
        ${reviewsText}
        `;

        const requestBody = {
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.2 }
        };

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        });

        if (!response.ok) throw new Error("Yapay zeka analiz servisine ulaşılamadı.");

        const data = await response.json();
        let jsonStr = data.candidates[0].content.parts[0].text.trim();
        
        // Temizlik: Markdown tag'lerini kaldır
        if(jsonStr.startsWith("```json")) jsonStr = jsonStr.substring(7);
        if(jsonStr.startsWith("```")) jsonStr = jsonStr.substring(3);
        if(jsonStr.endsWith("```")) jsonStr = jsonStr.substring(0, jsonStr.length - 3);

        const resultObj = JSON.parse(jsonStr);
        renderResults(resultObj);
    }

    function renderResults(data) {
        const generateHTML = (categoryData) => {
            return `
                <strong>🍔 Yiyecekler:</strong>
                <ul>${categoryData.yiyecekler.length > 0 ? categoryData.yiyecekler.map(i => `<li>${i}</li>`).join('') : '<li>Veri yok</li>'}</ul>
                <strong>🍹 İçecekler:</strong>
                <ul>${categoryData.icecekler.length > 0 ? categoryData.icecekler.map(i => `<li>${i}</li>`).join('') : '<li>Veri yok</li>'}</ul>
                <strong>🍰 Tatlılar:</strong>
                <ul>${categoryData.tatlilar.length > 0 ? categoryData.tatlilar.map(i => `<li>${i}</li>`).join('') : '<li>Veri yok</li>'}</ul>
            `;
        };

        document.getElementById('bestContent').innerHTML = generateHTML(data.en_iyi);
        document.getElementById('midContent').innerHTML = generateHTML(data.orta);
        document.getElementById('worstContent').innerHTML = generateHTML(data.en_kotu);

        document.getElementById('resultsArea').style.display = 'block';
    }
</script>

</body>
</html>
