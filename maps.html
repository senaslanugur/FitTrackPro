  var NEG = ["kötü","berbat","rezalet","soğuk","bayat","tatsız","beğenmedim","terrible","bad","awful","disgusting","worst","horrible","poor","bland","overpriced"];
  var FOODS = ["adana kebap","adana","urfa kebap","iskender","döner","lahmacun","pide","etli pide","kaşarlı pide","kıymalı pide","mantı","köfte","izgara köfte","çiğ köfte","şiş","kuzu şiş","tavuk şiş","kanat","kuzu tandır","tandır","güveç","testi kebabı","etli ekmek","mercimek çorbası","ezogelin","çorba","baklava","kadayıf","künefe","sütlaç","kazandibi","dondurma","hummus","acılı ezme","cacık","haydari","patlıcan","meze","balık","levrek","çipura","hamsi","alabalık","karides","ahtapot","börek","su böreği","gözleme","poğaça","pilav","bulgur","fasulye","barbunya","pizza","burger","sandviç","salata","makarna","kahvaltı","serpme kahvaltı","omlet","menemen","sucuk","şekerpare","revani","lokma","wrap","steak","kebab","kebap","schnitzel","risotto","ramen","sushi"];

// ── Log satırı ekle ───────────────────────────────────────────
function log(msg, type) {
var d = document.getElementById(“log”);
var line = document.createElement(“div”);
line.className = type || “info”;
line.textContent = msg;
d.appendChild(line);
}
function clearLog() { document.getElementById(“log”).innerHTML = “”; }

// ── Metin analizleri ──────────────────────────────────────────
function extractName(text) {
var m = text.match(/Title:\s*(.+)/i) || text.match(/^# (.+)/m) || text.match(/^(.{4,60})\n/);
if (m) {
var n = m[1].trim().replace(/\s*[-|·–—]\s*.*/,””).trim();
if (n.length > 2 && n.length < 80) return n;
}
return “Restoran”;
}
function extractRating(text) {
var m = text.match(/([1-5][.,]\d)\s*(yıldız|star|/5)/i) || text.match(/([1-5][.,]\d)\s*(\d/);
return m ? parseFloat(m[1].replace(”,”,”.”)) : null;
}
function extractReviewCount(text) {
var m = text.match(/(\d[\d.]+)\s*(yorum|değerlend|review)/i);
return m ? parseInt(m[1].replace(/./g,””)) : 0;
}
function scoreFood(text, foods) {
var lower = text.toLowerCase();
var sentences = lower.split(/[\n.!?]+/).filter(function(s){ return s.trim().length > 4; });
var out = [];
foods.forEach(function(food) {
if (lower.indexOf(food) === -1) return;
var score = 0, count = 0;
sentences.forEach(function(s) {
if (s.indexOf(food) === -1) return;
count++;
POS.forEach(function(p){ if (s.indexOf(p) !== -1) score += 2; });
NEG.forEach(function(n){ if (s.indexOf(n) !== -1) score -= 2; });
});
if (count > 0) out.push({ name: food, score: score, count: count });
});
return out.sort(function(a,b){ return (b.score+b.count)-(a.score+a.count); });
}
function extractSentences(text, food) {
return text.split(/[.!?\n]+/)
.filter(function(s){ return s.toLowerCase().indexOf(food) !== -1 && s.trim().length > 12; })
.slice(0,2).map(function(s){ return s.trim(); }).join(” “).slice(0,280);
}

// ── Metni işle ve sonucu göster ───────────────────────────────
function processText(text) {
document.getElementById(“rawBox”).textContent = text.slice(0, 5000);

```
var name  = extractName(text);
var rating = extractRating(text);
var reviewCount = extractReviewCount(text);
var ranked = scoreFood(text, FOODS);

var posC = POS.filter(function(p){ return text.toLowerCase().indexOf(p) !== -1; }).length;
var negC = NEG.filter(function(n){ return text.toLowerCase().indexOf(n) !== -1; }).length;
var score = rating
  ? Math.round(rating * 2 * 10) / 10
  : Math.round(Math.min(9.5, Math.max(5, 7 + posC * 0.12 - negC * 0.25)) * 10) / 10;

if (ranked.length === 0) {
  log("⚠️ Tanınan yemek bulunamadı. Ham veriyi inceleyebilirsiniz.", "err");
  document.getElementById("rawBox").style.display = "block";
  return;
}

var best   = ranked[0];
var others = ranked.slice(1, 4).map(function(r){ return r.name; });
var why    = extractSentences(text, best.name);
if (!why) why = '"' + best.name + '" bu restoranın yorumlarında en çok öne çıkan lezzet.';

document.getElementById("rName").textContent  = name;
document.getElementById("rDish").textContent  = best.name.charAt(0).toUpperCase() + best.name.slice(1);
document.getElementById("rScore").textContent = "⭐ " + score + " / 10" + (reviewCount > 0 ? "  ·  " + reviewCount + "+ yorum" : "");
document.getElementById("rWhy").textContent   = why;

var tagsEl = document.getElementById("rTags");
tagsEl.innerHTML = "";
if (others.length > 0) {
  document.getElementById("othersCard").style.display = "block";
  others.forEach(function(o) {
    var t = document.createElement("span");
    t.className = "tag";
    t.textContent = o.charAt(0).toUpperCase() + o.slice(1);
    tagsEl.appendChild(t);
  });
}

clearLog();
log("✅ Analiz tamamlandı!", "ok");
document.getElementById("result").style.display = "block";
setTimeout(function(){ document.getElementById("result").scrollIntoView({ behavior:"smooth", block:"start" }); }, 100);

}
var proxyUrl = proxies[index](targetUrl);
