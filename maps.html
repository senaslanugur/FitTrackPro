<body>
<div class="container">

<script>
  var btn = document.getElementById("btn");
  var status = document.getElementById("status");
  var result = document.getElementById("result");

function setStatus(msg, type) {
status.textContent = msg;
status.className = type;
status.style.display = “block”;
}

function hideStatus() {
status.style.display = “none”;
}

// Pozitif / negatif kelimeler
var POS = [“harika”,“muhteşem”,“lezzetli”,“nefis”,“mükemmel”,“enfes”,“inanılmaz”,“süper”,“çok iyi”,“güzel”,“tavsiye”,“şahane”,“efsane”,“bayıldım”,“sevdim”,“beğendim”,“taze”,“kaliteli”,“delicious”,“amazing”,“excellent”,“great”,“best”,“wonderful”,“tasty”,“perfect”,“recommend”,“favorite”,“must try”,“incredible”];
var NEG = [“kötü”,“berbat”,“rezalet”,“soğuk”,“bayat”,“tatsız”,“beğenmedim”,“terrible”,“bad”,“awful”,“disgusting”,“worst”,“horrible”,“poor”];

// Bilinen yemekler listesi
var FOODS = [
“adana kebap”,“adana”,“urfa kebap”,“urfa”,“iskender”,“döner”,“lahmacun”,
“pide”,“etli pide”,“kaşarlı pide”,“kıymalı pide”,“mantı”,“köfte”,“izgara köfte”,
“çiğ köfte”,“şiş köfte”,“kuzu şiş”,“tavuk şiş”,“kanat”,“kuzu tandır”,“tandır”,
“güveç”,“testi kebabı”,“etli ekmek”,“mercimek çorbası”,“ezogelin”,“çorba”,
“baklava”,“kadayıf”,“künefe”,“sütlaç”,“kazandibi”,“dondurma”,
“hummus”,“acılı ezme”,“cacık”,“haydari”,“patlıcan salatası”,“meze”,
“tavuk”,“balık”,“levrek”,“çipura”,“hamsi”,“alabalık”,“karides”,“ahtapot”,
“börek”,“su böreği”,“gözleme”,“poğaça”,
“pilav”,“bulgur pilavı”,“bulgur”,“fasulye”,“barbunya”,
“pizza”,“burger”,“sandviç”,“salata”,“makarna”,
“kahvaltı”,“serpme kahvaltı”,“omlet”,“menemen”,“sucuk”,
“baklava”,“şekerpare”,“revani”,“lokma”,
“wrap”,“steak”,“kebab”,“kebap”
];

function extractName(text) {
var m = text.match(/Title:\s*(.+)/i) || text.match(/^# (.+)/m) || text.match(/^(.{4,60})\n/);
if (m) {
var name = m[1].trim().replace(/\s*[-|·–]\s*.*/,””).trim();
if (name.length > 2 && name.length < 80) return name;
}
return “Restoran”;
}

function extractRating(text) {
var m = text.match(/([1-5][.,]\d)\s*(yıldız|star|/5)/i)
|| text.match(/([1-5][.,]\d)\s*(\d/);
if (m) return parseFloat(m[1].replace(”,”,”.”));
return null;
}

function extractReviewCount(text) {
var m = text.match(/(\d[\d.]+)\s*(yorum|değerlend|review)/i);
if (m) return parseInt(m[1].replace(/./g,””));
return 0;
}

function scoreFood(text, foods) {
var lower = text.toLowerCase();
var sentences = lower.split(/[\n.!?]+/).filter(function(s){ return s.trim().length > 4; });
var results = [];

```
foods.forEach(function(food) {
  if (lower.indexOf(food.toLowerCase()) === -1) return;
  var score = 0;
  var count = 0;
  sentences.forEach(function(s) {
    if (s.indexOf(food.toLowerCase()) === -1) return;
    count++;
    POS.forEach(function(p){ if (s.indexOf(p) !== -1) score += 2; });
    NEG.forEach(function(n){ if (s.indexOf(n) !== -1) score -= 2; });
  });
  if (count > 0) results.push({ name: food, score: score, count: count });
});

results.sort(function(a,b){ return (b.score + b.count) - (a.score + a.count); });
return results;
```

}

function extractSentences(text, foodName) {
var sentences = text.split(/[.!?\n]+/).filter(function(s){ return s.trim().length > 10; });
var relevant = sentences.filter(function(s){
var sl = s.toLowerCase();
return sl.indexOf(foodName.toLowerCase()) !== -1;
});
return relevant.slice(0, 2).map(function(s){ return s.trim(); }).join(” “);
}

function analyze() {
var url = document.getElementById(“urlInput”).value.trim();
if (!url) { setStatus(“Lütfen bir Google Maps URL’si girin.”, “error”); return; }

```
btn.disabled = true;
btn.textContent = "Analiz ediliyor...";
result.style.display = "none";
setStatus("🔗 Jina AI Reader ile sayfa çekiliyor...", "info");

var jinaUrl = "https://r.jina.ai/" + url;

fetch(jinaUrl, {
  method: "GET",
  headers: {
    "Accept": "text/plain",
    "X-Return-Format": "text"
  }
})
.then(function(res) {
  if (!res.ok) throw new Error("Sayfa çekilemedi. HTTP " + res.status + ". URL'yi kontrol edin.");
  setStatus("📖 İçerik analiz ediliyor...", "info");
  return res.text();
})
.then(function(text) {
  // Ham veriyi sakla
  document.getElementById("rawContent").textContent = text.slice(0, 4000);

  var name = extractName(text);
  var rating = extractRating(text);
  var reviewCount = extractReviewCount(text);
  var ranked = scoreFood(text, FOODS);

  var posCount = POS.filter(function(p){ return text.toLowerCase().indexOf(p) !== -1; }).length;
  var negCount = NEG.filter(function(n){ return text.toLowerCase().indexOf(n) !== -1; }).length;
  var score = rating
    ? Math.round(rating * 2 * 10) / 10
    : Math.min(9.5, Math.max(5, 7 + posCount * 0.1 - negCount * 0.2));
  score = Math.round(score * 10) / 10;

  if (ranked.length === 0) {
    setStatus("⚠️ Sayfada tanınan yemek ismi bulunamadı. Ham veriyi kontrol edin.", "error");
    document.getElementById("rawContent").style.display = "block";
    btn.disabled = false;
    btn.textContent = "Analiz Et";
    return;
  }

  var best = ranked[0];
  var others = ranked.slice(1, 4).map(function(r){ return r.name; });
  var why = extractSentences(text, best.name);
  if (!why) why = '"' + best.name + '" bu restoranın en çok önerilen yemeği olarak öne çıkıyor.';

  document.getElementById("rRestaurant").textContent = name;
  document.getElementById("rDish").textContent = best.name.charAt(0).toUpperCase() + best.name.slice(1);
  document.getElementById("rScore").textContent = "⭐ " + score + " / 10";
  document.getElementById("rWhy").textContent = why;

  var tagsEl = document.getElementById("rTags");
  tagsEl.innerHTML = "";
  if (others.length > 0) {
    document.getElementById("othersLabel").style.display = "block";
    others.forEach(function(o) {
      var t = document.createElement("span");
      t.className = "tag";
      t.textContent = o.charAt(0).toUpperCase() + o.slice(1);
      tagsEl.appendChild(t);
    });
  }

  hideStatus();
  result.style.display = "block";
  result.scrollIntoView({ behavior: "smooth", block: "start" });
})
.catch(function(err) {
  setStatus("❌ Hata: " + err.message, "error");
})
.finally(function() {
  btn.disabled = false;
  btn.textContent = "Analiz Et";
});
```

}

btn.addEventListener(“click”, analyze);

document.getElementById(“urlInput”).addEventListener(“keydown”, function(e) {
if (e.key === “Enter”) analyze();
});

document.getElementById(“rawToggle”).addEventListener(“click”, function() {
var raw = document.getElementById(“rawContent”);
if (raw.style.display === “block”) {
raw.style.display = “none”;
this.textContent = “▾ Ham veriyi göster”;
} else {
raw.style.display = “block”;
this.textContent = “▴ Ham veriyi gizle”;
}
});
</script>
