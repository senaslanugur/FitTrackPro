<button id="btn">Analiz Et</button>

<script>
  function clearLog() { document.getElementById("log").innerHTML = ""; }
  function addLog(msg, cls) {
    var el = document.createElement("div");
    el.className = cls || "l-info";
    el.textContent = msg;
    document.getElementById("log").appendChild(el);
  }

// ── Jina ile sayfa çek (proxy fallback) ───────────────────────
function fetchJina(url) {
var target = “https://r.jina.ai/” + url;
var tries = [
target,
“https://api.allorigins.win/raw?url=” + encodeURIComponent(target),
“https://corsproxy.io/?” + encodeURIComponent(target)
];
var i = 0;

```
function next() {
  if (i >= tries.length) return Promise.reject(new Error("Sayfa çekilemedi, tüm proxy'ler denendi."));
  var u = tries[i++];
  addLog("🔗 Sayfa çekiliyor (" + i + "/" + tries.length + ")...", "l-info");
  return fetch(u)
    .then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(function(t) {
      if (!t || t.length < 80) throw new Error("Boş yanıt");
      return t;
    })
    .catch(function(e) {
      addLog("  ↳ " + e.message, "l-info");
      return next();
    });
}
return next();
```

}

// ── Pollinations.ai ile analiz ────────────────────────────────
// Tamamen ücretsiz, kayıt yok, key yok
function callPollinations(pageText, originalUrl) {
var prompt = “Sen bir gurme yemek analistisin.\n\n”
+ “Aşağıda bir Google Maps restoran sayfasının metin içeriği var:\n\n”
+ pageText.slice(0, 3500)
+ “\n\nORİJİNAL URL: “ + originalUrl
+ “\n\nBu içeriği analiz et. Restoranın adını, en çok önerilen yemeği ve genel puanı belirle.”
+ “\n\nSADECE geçerli JSON döndür, başka hiçbir şey yazma:\n”
+ ‘{“restaurant_name”:“Restoranın adı”,“best_dish”:“En iyi yemek”,“score”:8.5,“why”:“2-3 cümle açıklama”,“honorable_mentions”:[“yemek2”,“yemek3”],“verdict”:“Tek cümle tavsiye”,“review_count”:0,“sentiment”:“positive”}’;

```
addLog("🤖 Pollinations.ai ile analiz ediliyor...", "l-info");

return fetch("https://text.pollinations.ai/", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    messages: [{ role: "user", content: prompt }],
    model: "openai",
    seed: 42,
    jsonMode: true
  })
})
.then(function(r) {
  if (!r.ok) throw new Error("Pollinations HTTP " + r.status);
  return r.text();
})
.then(function(text) {
  if (!text || text.trim().length < 10) throw new Error("Pollinations boş yanıt döndürdü.");
  var clean = text.replace(/```json|```/g, "").trim();
  var match = clean.match(/\{[\s\S]*\}/);
  if (!match) throw new Error("JSON ayrıştırılamadı. Yanıt: " + text.slice(0, 120));
  return JSON.parse(match[0]);
});
```

}

// ── Sonucu göster ─────────────────────────────────────────────
function showResult(r) {
document.getElementById(“rName”).textContent    = r.restaurant_name || “—”;
document.getElementById(“rDish”).textContent    = r.best_dish || “—”;
document.getElementById(“rScore”).textContent   = “⭐ “ + (r.score || “—”) + “ / 10” + (r.review_count > 0 ? “  ·  “ + r.review_count + “+ yorum” : “”);
document.getElementById(“rWhy”).textContent     = r.why || “”;
document.getElementById(“rVerdict”).textContent = r.verdict ? ‘”’ + r.verdict + ‘”’ : “”;

```
var tagsEl = document.getElementById("rTags");
tagsEl.innerHTML = "";
var mentions = (r.honorable_mentions || []).filter(Boolean);
if (mentions.length > 0) {
  mentions.forEach(function(m) {
    var t = document.createElement("span");
    t.className = "tag";
    t.textContent = m;
    tagsEl.appendChild(t);
  });
  document.getElementById("othersCard").style.display = "block";
} else {
  document.getElementById("othersCard").style.display = "none";
}

document.getElementById("result").style.display = "block";
setTimeout(function() {
  document.getElementById("result").scrollIntoView({ behavior: "smooth", block: "start" });
}, 100);
```

}

// ── Ana akış ──────────────────────────────────────────────────
document.getElementById(“btn”).addEventListener(“click”, function() {
var url = document.getElementById(“urlInput”).value.trim();
clearLog();
document.getElementById(“result”).style.display = “none”;

```
if (!url) { addLog("❌ Lütfen bir Google Maps URL'si girin.", "l-err"); return; }

var btn = this;
btn.disabled = true;
btn.innerHTML = '<span class="spinner"></span><span>Analiz ediliyor...</span>';

fetchJina(url)
  .then(function(pageText) {
    addLog("✅ Sayfa çekildi — " + pageText.length + " karakter", "l-ok");
    document.getElementById("rawBox").textContent = pageText.slice(0, 5000);
    return callPollinations(pageText, url);
  })
  .then(function(r) {
    addLog("✅ Analiz tamamlandı!", "l-ok");
    showResult(r);
  })
  .catch(function(e) {
    addLog("❌ " + (e.message || "Bilinmeyen hata"), "l-err");
  })
  .finally(function() {
    btn.disabled = false;
    btn.innerHTML = "Analiz Et";
  });
```

});

document.getElementById(“urlInput”).addEventListener(“keydown”, function(e) {
if (e.key === “Enter”) document.getElementById(“btn”).click();
});

document.getElementById(“rawToggle”).addEventListener(“click”, function() {
var box = document.getElementById(“rawBox”);
var show = box.style.display !== “block”;
box.style.display = show ? “block” : “none”;
this.textContent = show ? “▴ Ham veriyi gizle” : “▾ Ham veriyi göster”;
});
</script>
