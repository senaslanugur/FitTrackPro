<body>
<div class="wrap">

  <div class="header">
    <span class="emoji">🍽️</span>
    <h1>Lezzet Analisti</h1>
    <p>Google Maps URL ver · En iyi yemeği bul</p>
    <div class="hr"></div>
  </div>

  <div class="nokey-banner">
    <span class="icon">🔓</span>
    <span>API anahtarı gerekmez · Tamamen ücretsiz · Jina AI Reader ile çalışır</span>
  </div>

  <div class="card">
    <label class="lbl">📍 Google Maps Restoran URL'si</label>
    <div class="inp-wrap">
      <span class="ico">📍</span>
      <input type="text" id="urlInput" placeholder="https://maps.app.goo.gl/..."/>
    </div>
    <p class="hint">💡 Kısa (maps.app.goo.gl) ve uzun Google Maps URL'leri desteklenir</p>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">Bağlanıyor...</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

<button id="analyzeBtn" onclick="analyze()">Analiz Et →</button>

  <div class="err" id="errBox"></div>

  <div id="result">
    <div class="r-name-wrap">
      <small>Restoran</small>
      <div class="r-name" id="rName"></div>
    </div>
    <div class="hero">
      <div class="trophy-lbl">🏆 En İyi Yemek</div>
      <div class="dish" id="rDish"></div>
      <div class="badges" id="rBadges"></div>
      <div class="why" id="rWhy"></div>
      <div class="verdict" id="rVerdict"></div>
    </div>
    <div class="mentions" id="mentionsCard">
      <div class="m-title">Diğer Öneriler</div>
      <div class="tags" id="rMentions"></div>
    </div>
    <button class="toggle-raw" onclick="toggleRaw()">📄 Ham veriyi göster / gizle</button>
    <div class="raw-box" id="rawBox"></div>
    <button id="resetBtn" onclick="resetForm()">Yeni Restoran Analiz Et</button>
  </div>

</div>
<script>
// ─── İlerleme ───────────────────────────────────────────────────
function setProgress(pct, label) {
  document.getElementById("progressWrap").style.display = "block";
  document.getElementById("progressLabel").textContent = label;
  document.getElementById("progressFill").style.width = pct + "%";
}

function setLoading(on) {
const btn = document.getElementById(“analyzeBtn”);
if (on) {
btn.innerHTML = `<span class="spinner"></span><span id="btnTxt">Analiz ediliyor...</span>`;
btn.disabled = true;
} else {
btn.innerHTML = “Analiz Et →”;
btn.disabled = false;
document.getElementById(“progressWrap”).style.display = “none”;
}
}

function setBtnText(t) {
const el = document.getElementById(“btnTxt”);
if (el) el.textContent = t;
}

function showError(msg) {
const el = document.getElementById(“errBox”);
el.innerHTML = “⚠️ “ + msg;
el.style.display = “block”;
}

// ─── Jina Reader ile sayfa çek ───────────────────────────────────
async function fetchWithJina(url) {
// r.jina.ai/{url} — ücretsiz, API key yok
const jinaUrl = “https://r.jina.ai/” + url;
const res = await fetch(jinaUrl, {
headers: { “Accept”: “text/plain”, “X-Return-Format”: “text”, “X-No-Cache”: “true” }
});
if (!res.ok) throw new Error(“Sayfa çekilemedi. (HTTP “ + res.status + “)”);
return await res.text();
}

// ─── Pozitif/negatif kelimeler ───────────────────────────────────
const POS_TR = [“harika”,“muhteşem”,“lezzetli”,“nefis”,“mükemmel”,“enfes”,“inanılmaz”,“süper”,“çok iyi”,“güzel”,“tavsiye”,“şahane”,“efsane”,“fevkalade”,“olağanüstü”,“mükemmel”,“bayıldım”,“sevdim”,“beğendim”,“tebrikler”,“başarılı”,“ideal”,“gerçekten iyi”,“çok güzel”,“vazgeçilmez”,“favorim”,“en sevdiğim”,“mutlaka deneyin”,“kesinlikle”,“taze”,“kaliteli”];
const NEG_TR = [“kötü”,“berber”,“rezalet”,“soğuk”,“bayat”,“tatsız”,“pahalı”,“yavaş”,“beklettiler”,“sinir”,“berbat”,“çok kötü”,“olmaz”,“beğenmedim”,“boş”,“sönük”,“sıradan”];

// ─── Metinden yemek skorlama ─────────────────────────────────────
function scoreItems(text, items) {
const lines = text.toLowerCase().split(/[\n.!?]+/).filter(l => l.trim().length > 5);
const scores = {};
const counts = {};

items.forEach(item => {
const key = item.toLowerCase();
scores[item] = 0;
counts[item] = 0;
lines.forEach(line => {
if (!line.includes(key)) return;
counts[item]++;
POS_TR.forEach(p => { if (line.includes(p)) scores[item] += 2; });
NEG_TR.forEach(n => { if (line.includes(n)) scores[item] -= 1; });
});
});

return items
.filter(i => counts[i] > 0)
.sort((a, b) => (scores[b] + counts[b]) - (scores[a] + counts[a]));
}

// ─── Metinden potansiyel yemek isimlerini bul ────────────────────
function extractFoodCandidates(text) {
const lower = text.toLowerCase();

// Yaygın Türk yemekleri sözlüğü
const knownFoods = [
“adana kebap”,“adana”,“urfa kebap”,“urfa”,“iskender”,“döner”,“lahmacun”,“pide”,“mantı”,
“köfte”,“izgara köfte”,“çiğ köfte”,“şiş köfte”,“kuzu şiş”,“tavuk şiş”,“kanat”,
“kuzu tandır”,“tandır”,“güveç”,“testi kebabı”,“testi”,“etli ekmek”,
“mercimek çorbası”,“ezogelin”,“işkembe”,“paça”,“beyran”,“çorba”,
“baklava”,“kadayıf”,“künefe”,“sütlaç”,“kazandibi”,“profiterol”,“dondurma”,
“hummus”,“acılı ezme”,“cacık”,“haydari”,“patlıcan salatası”,“mezeleri”,“meze”,
“tavuk”,“balık”,“levrek”,“çipura”,“hamsi”,“alabalık”,“karides”,“ahtapot”,
“börek”,“su böreği”,“gözleme”,“poğaça”,“simit”,“açma”,
“pilav”,“bulgur pilavı”,“bulgur”,“nohutlu”,“fasulye”,“barbunya”,
“pizza”,“burger”,“sandviç”,“salata”,“makarna”,“risotto”,
“kahvaltı”,“serpme kahvaltı”,“omlet”,“menemen”,“sucuk”,
“tatlı”,“pasta”,“kek”,“cheesecake”,“tiramisu”,
“çay”,“kahve”,“türk kahvesi”,“ayran”,“şalgam”,“limonata”,
“et”,“kuzu”,“dana”,“pirzola”,“biftek”,“antrikot”,“bonfile”,
“sarma”,“dolma”,“yaprak sarma”,“etli dolma”,“zeytinyağlı”,
“imam bayıldı”,“karnıyarık”,“musakka”,
“künefe”,“baklava”,“şekerpare”,“revani”,“lokma”,
“lahmacun”,“pide”,“etli pide”,“kaşarlı”,“kıymalı”,
“wrap”,“taco”,“falafel”,“shawarma”,
“steak”,“t-bone”,“ribeye”,
“sushi”,“ramen”,“pad thai”,
“soup”,“salad”,“pasta”,“risotto”
];

// Metinde geçen bilinen yemekleri bul
const found = knownFoods.filter(f => lower.includes(f));

// Ayrıca büyük harfle başlayan 2-3 kelimelik grupları topla (menü kalemleri olabilir)
const menuPattern = /([A-ZÇĞİÖŞÜ][a-zçğışöüA-ZÇĞİÖŞÜ]+(?:\s+[A-ZÇĞİÖŞÜa-zçğışöüA-ZÇĞİÖŞÜ]+){0,2})/g;
const dynamicItems = […new Set((text.match(menuPattern) || []).filter(m => m.length > 3 && m.length < 40))];

return […new Set([…found, …dynamicItems])];
}

// ─── Restoran adını tahmin et ────────────────────────────────────
function extractRestaurantName(text) {
// “Title:” veya ilk başlık satırı
const titleMatch = text.match(/Title:\s*(.+)/i) || text.match(/^#\s*(.+)/m) || text.match(/^(.{5,60})\n/);
if (titleMatch) {
let name = titleMatch[1].trim().replace(/\s*[-|·–—]\s*.*/,””).trim();
if (name.length > 2 && name.length < 80) return name;
}
return “Restoran”;
}

// ─── Google Maps puanını bul ─────────────────────────────────────
function extractRating(text) {
const m = text.match(/(\d[.,]\d)\s*(?:yıldız|star|/5|puan|rating)/i)
|| text.match(/(\d[.,]\d)\s*(\d/);
if (m) return parseFloat(m[1].replace(”,”,”.”));
return null;
}

function extractReviewCount(text) {
const m = text.match(/(\d[\d.,]+)\s*(?:yorum|review|değerlend|oy)/i);
if (m) return parseInt(m[1].replace(/[.,]/g,””));
return 0;
}

// ─── Ana analiz ──────────────────────────────────────────────────
function analyzeText(text) {
const restaurantName = extractRestaurantName(text);
const rating = extractRating(text);
const reviewCount = extractReviewCount(text);

// Yemek adaylarını çıkar ve skorla
const candidates = extractFoodCandidates(text);
const ranked = scoreItems(text, candidates);

// Puan hesapla
const posWords = POS_TR.filter(p => text.toLowerCase().includes(p)).length;
const negWords = NEG_TR.filter(n => text.toLowerCase().includes(n)).length;
const sentiment = negWords > posWords * 0.4 ? “mixed” : posWords > 3 ? “positive” : “mixed”;

const score = rating
? Math.round(rating * 2 * 10) / 10   // 5 üzeri → 10’a çevir
: Math.min(10, Math.max(5, 7 + posWords * 0.15 - negWords * 0.3)).toFixed(1);

if (ranked.length === 0) {
return {
restaurant_name: restaurantName,
best_dish: “Belirlenemedi”,
score: score,
why: “Sayfada yeterli yemek yorumu bulunamadı. Yorumların Türkçe veya İngilizce olduğundan emin olun.”,
honorable_mentions: [],
verdict: “Daha fazla yorum gerekiyor.”,
review_count: reviewCount,
sentiment
};
}

const best = ranked[0];
const others = ranked.slice(1, 4);

// En iyi yemek için yorumları topla
const lower = text.toLowerCase();
const lines = text.split(/[\n.!?]+/);
const relevantLines = lines
.filter(l => l.toLowerCase().includes(best.toLowerCase()))
.filter(l => l.trim().length > 15)
.slice(0, 3);

const why = relevantLines.length > 0
? relevantLines.map(l => l.trim()).join(” “).slice(0, 280)
: `"${best}" bu restoranın yorumlarında en sık olumlu bağlamda geçen yemek olarak öne çıktı.`;

const positiveCount = POS_TR.filter(p => lower.includes(p)).length;
const verdict = positiveCount > 5
? `${restaurantName}'da mutlaka "${best}" deneyin!`
: `"${best}" buranın öne çıkan lezzeti.`;

return {
restaurant_name: restaurantName,
best_dish: best,
score: Number(score),
why: why.slice(0, 300),
honorable_mentions: others,
verdict,
review_count: reviewCount,
sentiment
};
}

// ─── Sonucu ekrana bas ───────────────────────────────────────────
function showResult(r) {
document.getElementById(“rName”).textContent = r.restaurant_name || “”;
document.getElementById(“rDish”).textContent = r.best_dish || “”;
document.getElementById(“rWhy”).textContent = r.why || “”;
document.getElementById(“rVerdict”).textContent = ‘”’ + (r.verdict || “”) + ‘”’;

const badges = document.getElementById(“rBadges”);
badges.innerHTML = “”;
if (r.score) {
const b = document.createElement(“span”);
b.className = “bdg pos”;
b.textContent = “⭐ “ + r.score + “/10”;
badges.appendChild(b);
}
const sb = document.createElement(“span”);
sb.className = “bdg neu”;
sb.textContent = { positive:“Olumlu yorumlar”, mixed:“Karışık yorumlar”, negative:“Olumsuz yorumlar” }[r.sentiment] || “Yorumlar”;
badges.appendChild(sb);
if (r.review_count > 0) {
const rb = document.createElement(“span”);
rb.className = “bdg neu”;
rb.textContent = r.review_count + “+ yorum”;
badges.appendChild(rb);
}

const mentions = (r.honorable_mentions || []).filter(Boolean);
const mc = document.getElementById(“mentionsCard”);
if (mentions.length > 0) {
const ct = document.getElementById(“rMentions”);
ct.innerHTML = “”;
mentions.forEach(m => {
const t = document.createElement(“span”);
t.className = “tag”; t.textContent = m;
ct.appendChild(t);
});
mc.style.display = “block”;
} else {
mc.style.display = “none”;
}

document.getElementById(“result”).style.display = “block”;
setTimeout(() => document.getElementById(“result”).scrollIntoView({ behavior:“smooth”, block:“start” }), 100);
}

// ─── Ana fonksiyon ───────────────────────────────────────────────
async function analyze() {
const url = document.getElementById(“urlInput”).value.trim();
document.getElementById(“errBox”).style.display = “none”;
document.getElementById(“result”).style.display = “none”;

if (!url) { showError(“Lütfen bir Google Maps URL’si girin.”); return; }

setLoading(true);

try {
// Adım 1: Jina ile sayfayı çek
setProgress(20, “🔗 Sayfa çekiliyor…”);
setBtnText(“Sayfa çekiliyor…”);
const pageText = await fetchWithJina(url);
document.getElementById(“rawBox”).textContent = pageText.slice(0, 3000);

```
// Adım 2: Analiz et
setProgress(60, "🔍 Yorumlar analiz ediliyor...");
setBtnText("Yorumlar analiz ediliyor...");
await new Promise(r => setTimeout(r, 300));

const result = analyzeText(pageText);

// Adım 3: Sonuç
setProgress(100, "✅ Tamamlandı!");
setBtnText("Tamamlandı!");
await new Promise(r => setTimeout(r, 400));

showResult(result);
```

} catch(e) {
showError(e.message || “Bilinmeyen hata.”);
} finally {
setLoading(false);
}
}

function toggleRaw() {
const el = document.getElementById(“rawBox”);
el.style.display = el.style.display === “block” ? “none” : “block”;
}

function resetForm() {
document.getElementById(“urlInput”).value = “”;
document.getElementById(“result”).style.display = “none”;
document.getElementById(“errBox”).style.display = “none”;
window.scrollTo({ top:0, behavior:“smooth” });
}

document.addEventListener(“keydown”, e => { if (e.key === “Enter”) analyze(); });
</script>
