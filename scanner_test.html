<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Pro Tarayıcı: Tüm BIST & Kripto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: bold; }
        .tab-inactive { border-bottom: 3px solid transparent; color: #6b7280; }
        .loading-spinner {
            border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%;
            width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .pass { color: #16a34a; font-weight: 600; }
        .fail { color: #dc2626; font-weight: 600; }
        .neutral { color: #6b7280; }
        .signal-row { background-color: #f0fdf4 !important; border-left: 4px solid #16a34a; }
        .progress-bar { transition: width 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 p-4 md:p-8">

    <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden">
        <header class="bg-blue-900 text-white p-6">
            <h1 class="text-3xl font-bold flex items-center gap-2">🚀 Pro Piyasa Tarayıcı</h1>
            <p class="text-blue-200 mt-1">Tüm BIST Hisseleri ve En Yüksek Hacimli Kriptolar için Gelişmiş Teknik Analiz</p>
        </header>

        <div class="flex border-b px-6">
            <button id="tab-bist" onclick="switchTab('bist')" class="px-6 py-4 text-lg tab-active">🇹🇷 Tüm BIST Hisseleri</button>
            <button id="tab-crypto" onclick="switchTab('crypto')" class="px-6 py-4 text-lg tab-inactive">₿ Kripto Paralar (Top 150)</button>
        </div>

        <div class="p-6">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-gray-50 p-4 rounded-lg">
                <div class="flex items-center gap-4">
                    <button id="scanBtn" onclick="startScan()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow transition flex items-center gap-2">
                        <span>🔍 Taramayı Başlat</span>
                    </button>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 cursor-pointer">
                        <input type="checkbox" id="filterSignals" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500">
                        Sadece AL Sinyali Olanları Göster
                    </label>
                </div>
                <div id="statusText" class="text-sm text-gray-600 font-mono">Hazır. Tarama bekleniyor.</div>
            </div>

            <div class="w-full bg-gray-200 rounded-full h-2.5 mb-4 hidden" id="progressContainer">
                <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full progress-bar" style="width: 0%"></div>
            </div>

            <div class="overflow-x-auto border rounded-lg">
                <table class="w-full text-sm text-left text-gray-600">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                        <tr>
                            <th class="px-4 py-3">Sembol</th>
                            <th class="px-4 py-3 text-right">Fiyat</th>
                            <th class="px-4 py-3 text-right">RSI (14)</th>
                            <th class="px-4 py-3 text-center">MACD Durumu</th>
                            <th class="px-4 py-3 text-center">Trend (MA 20/50/200)</th>
                            <th class="px-4 py-3 text-right">Hacim (vs 3G Ort)</th>
                            <th class="px-4 py-3 text-center">Sonuç</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <tr><td colspan="7" class="px-4 py-12 text-center text-gray-400 italic">Taramayı başlatmak için butona tıklayın.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const BIST_ALL_STOCKS = [
            "A1CAP", "ACSEL", "ADEL", "ADESE", "AFHOL", "AGHOL", "AGROT", "AHGAZ", "AHSGY", "AKBNK", "AKCNS", "AKENR", "AKFGY", "AKFIS", "AKGRT", "AKMGY", "AKSA", "AKSGY", "AKSUE", "ALARK", "ALCAR", "ALCTL", "ALFAS", "ALGYO", "ALKIM", "ALKLC", "ALMFB", "ALTNY", "ANANT", "ANHYT", "ANSGR", "ARCLK", "ARDYZ", "ARSAN", "ARZUM", "ASGYO", "ASTOR", "ATAGY", "ATLAS", "AVHOL", "AVOD", "AYCES", "AYDEM", "AYEN", "AYGAZ", "AZTEK", "B2AGM", "BAGFS", "BAHKM", "BAKAB", "BANVT", "BARMA", "BASCM", "BASGZ", "BAYRK", "BCRAL", "BEGYO", "BESAS", "BEYAZ", "BIESA", "BIMAS", "BINHO", "BIOEN", "BJKAS", "BMSTL", "BNTAS", "BRLSM", "BRKSN", "BRKVY", "BRMEN", "BRYTZ", "BSOKE", "BTCIM", "BTCHA", "BUZCE", "BVSAN", "CALKA", "CAMIS", "CATES", "CCLSM", "CEMTS", "CEOEM", "CMBTN", "CMENT", "COSMO", "CRDFA", "CRFSA", "CUSAN", "CWARG", "DAGI", "DAPGM", "DCTTR", "DEFAC", "DERHL", "DERIM", "DESA", "DESPC", "DEVA", "DFHOL", "DGNMO", "DHRND", "DILEK", "DLCCK", "DLKHY", "DMSAS", "DOAS", "DOBUR", "DOFER", "DOHOL", "DOKTA", "DURAL", "DURKN", "DYOBY", "EBEBK", "ECZYT", "EDATA", "EDIP", "EFESC", "EGEEN", "EGGUB", "EGPRO", "EGSER", "EGYAP", "EKGYO", "EKOS", "EKSUN", "ELITE", "EMKEL", "ENJSA", "ENSRI", "EPLAS", "EREGL", "EREN", "ESCAR", "ESCOM", "ESTUR", "EUPWR", "EUREN", "EYGYO", "FENER", "FIBAB", "FINES", "FLYGN", "FMYCL", "FONET", "FROTO", "GARAN", "GAREL", "GEDIK", "GENIL", "GERSA", "GLCVY", "GLRYH", "GOKNR", "GOLTS", "GOZDE", "GSDHO", "GSRAY", "GUNDG", "GZNMI", "HACMT", "HATSN", "HATEK", "HAZAR", "HEKTS", "HKTM", "HLBGY", "HLMET", "HRKET", "HUBVC", "HUNER", "HURRI", "ICBCT", "ICUGS", "IDCTS", "IHAAS", "IHLGM", "IHGZT", "IHYAY", "IMASM", "INDES", "INFO", "INGCH", "INTEM", "INVES", "IPEKE", "ISBTR", "ISCTR", "ISDMR", "ISFAS", "ISFIN", "ISGYO", "ISGSY", "ISKPL", "ISMEN", "ISNTR", "ISSEN", "ISYAT", "ISYEN", "IZFAS", "IZMDC", "JANTS", "KAREL", "KARSN", "KARTN", "KATMR", "KAYSE", "KCAER", "KCHOL", "KENT", "KERVN", "KLGYO", "KLMSN", "KLSER", "KMPST", "KOCMT", "KONTR", "KOPOL", "KORDS", "KORSA", "KOZAA", "KOZAL", "KRDMA", "KRDMB", "KRDMD", "KRONT", "KRTEK", "KSGYV", "KTLEV", "KTSKR", "KUYAS", "KZBGY", "LIDER", "LIDFA", "LKMNH", "LMKDC", "LOGO", "LTFHE", "MAGEN", "MAKIM", "MAKTK", "MAKVA", "MARKA", "MAVI", "MCATE", "MEDTR", "MEGAS", "MEKAG", "MELKI", "MERIT", "MERKO", "METUR", "MGROS", "MIATK", "MKSEN", "MLGYZ", "MNDRS", "MNDTR", "MOGAN", "MOGLY", "MPARK", "MRGYO", "MRSHL", "MSGSY", "MTRKS", "MURZY", "MUZ", "MZLUB", "NTHOL", "NUGYO", "OBASE", "OBAMS", "ODEAB", "ODINE", "ONCSM", "ONRGY", "ONTAM", "ORCAY", "ORGE", "ORKIM", "ORMA", "OSMEN", "OYAKC", "OYYAT", "OZATD", "OZBAL", "OZKGY", "PAMEL", "PARSN", "PASGY", "PASEU", "PATEK", "PCILT", "PDG", "PEGYO", "PENGD", "PERAS", "PERIT", "PETKM", "PETUN", "PGSUS", "PHNMY", "PKART", "PKENT", "PLTUR", "PNLSN", "PRDGS", "PRKME", "PRZMA", "PSGYO", "QNBFB", "RALYH", "RAYSG", "REEDR", "RGKAS", "RGYAS", "RNBOW", "RYSGU", "SAHOL", "SAMAT", "SANFM", "SANKO", "SARAY", "SARKY", "SARTL", "SASA", "SBTLY", "SCIL", "SEGMN", "SELEC", "SELVA", "SERNT", "SILVR", "SINPA", "SISAY", "SKYLP", "SKYMD", "SMRTG", "SNGYO", "SNICA", "SNKRN", "SOKE", "SOKM", "SONME", "SRVGY", "SUMAS", "SURGY", "TARKO", "TATEN", "TAVHL", "TCELL", "TEKTU", "TERA", "TETMT", "TFNVK", "THYAO", "TKFEN", "TKNSA", "TLMAN", "TMPOL", "TNZTP", "TOASO", "TSGYO", "TSPOR", "TUREX", "TURGG", "TUPRS", "TV18", "TYANA", "ULKER", "ULUSE", "UMPAS", "USAK", "VAKBN", "VAKFN", "VAKKO", "VBTY", "VDFLO", "VEGZY", "VERUS", "VESBE", "VESTL", "VKGYO", "VRGYO", "YAYLA", "YAZIC", "YAZLA", "YGYO", "YKBNK", "YKSLN", "YONGA", "YYAPI", "ZEDUR", "ZRGYO", "ZOREN"
        ];

        // ==========================================
        // TEKNİK ANALİZ MOTORU (Değişmedi)
        // ==========================================
        
        function calculateSMA(data, period) {
            if (data.length < period) return null;
            const slice = data.slice(-period);
            return slice.reduce((a, b) => a + b, 0) / period;
        }

        function calculateEMAArray(data, period) {
            if (data.length < period) return [];
            const k = 2 / (period + 1);
            let emaArray = [];
            let ema = data.slice(0, period).reduce((a, b) => a + b, 0) / period;
            emaArray.push(ema);
            for (let i = period; i < data.length; i++) {
                ema = data[i] * k + ema * (1 - k);
                emaArray.push(ema);
            }
            return emaArray;
        }

        function calculateRSI(closes, period = 14) {
            if (closes.length < period + 1) return null;
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                let diff = closes[i] - closes[i - 1];
                if (diff > 0) gains += diff; else losses -= diff;
            }
            let avgGain = gains / period;
            let avgLoss = losses / period;
            for (let i = period + 1; i < closes.length; i++) {
                let diff = closes[i] - closes[i - 1];
                let currentGain = diff > 0 ? diff : 0;
                let currentLoss = diff < 0 ? -diff : 0;
                avgGain = (avgGain * (period - 1) + currentGain) / period;
                avgLoss = (avgLoss * (period - 1) + currentLoss) / period;
            }
            if (avgLoss === 0) return 100;
            const rs = avgGain / avgLoss;
            return 100 - (100 / (1 + rs));
        }

        function checkMACDBullishCrossBelowZero(closes) {
            if (closes.length < 35) return { status: "Yetersiz Veri", met: false, val: 0 };
            const ema12 = calculateEMAArray(closes, 12);
            const ema26 = calculateEMAArray(closes, 26);
            
            const macdLine = [];
            const offset = ema12.length - ema26.length;
            for (let i = 0; i < ema26.length; i++) {
                macdLine.push(ema12[i + offset] - ema26[i]);
            }
            
            const signalLine = calculateEMAArray(macdLine, 9);
            if (signalLine.length < 2) return { status: "Yetersiz Veri", met: false, val: 0 };

            const macdToday = macdLine[macdLine.length - 1];
            const signalToday = signalLine[signalLine.length - 1];
            
            const macdYesterday = macdLine[macdLine.length - 1 - 8]; 
            const signalYesterday = signalLine[signalLine.length - 2];

            const isBelowZero = macdToday < 0;
            const crossedUp = (macdYesterday < signalYesterday) && (macdToday > signalToday);
            const isBullishTrend = isBelowZero && macdToday > signalToday;

            const met = isBelowZero && crossedUp;
            const status = met ? "✅ 0 Altı Yukarı Kesim" : 
                          (isBelowZero && isBullishTrend ? "⚠️ 0 Altı Pozitif" : 
                          (macdToday > 0 ? "❌ 0 Üstü" : "⬇️ Negatif"));
                          
            return { status, met, val: macdToday.toFixed(4) };
        }

        // ==========================================
        // 🆕 YENİ BIST VERİ ÇEKME MOTORU (Stooq API)
        // ==========================================
        
        // Stooq CSV çıktısını parse eder
        function parseStooqCSV(csv) {
            const lines = csv.trim().split('\n');
            if (lines.length < 30) throw new Error("Yetersiz geçmiş veri");
            
            const closes = [];
            const volumes = [];
            
            // Başlık satırını atla (Date,Open,High,Low,Close,Volume)
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',');
                if (parts.length >= 6) {
                    const close = parseFloat(parts[4]);
                    const volume = parseFloat(parts[5]) || 0;
                    if (!isNaN(close) && close > 0) {
                        closes.push(close);
                        volumes.push(volume);
                    }
                }
            }
            
            if (closes.length < 30) throw new Error("Veri parse edilemedi");
            return { closes, volumes };
        }

        async function fetchBISTData(ticker) {
            // 1. ÖNCELİK: Stooq API (CORS engeli YOK, çok hızlı)
            try {
                const stooqUrl = `https://stooq.com/q/d/l/?s=${ticker.toLowerCase()}.is&i=d`;
                const res = await fetch(stooqUrl);
                if (res.ok) {
                    const csv = await res.text();
                    if (csv && !csv.includes('No data') && csv.includes(',')) {
                        return parseStooqCSV(csv);
                    }
                }
            } catch (e) {
                console.warn(`Stooq ${ticker} için başarısız:`, e);
            }
            
            // 2. YEDEK: Yahoo Finance (Birden fazla proxy ile)
            const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}.IS?interval=1d&range=1y`;
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(yahooUrl)}`,
                `https://thingproxy.freeboard.io/fetch/${yahooUrl}`,
                `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`
            ];
            
            for (const proxyUrl of proxies) {
                try {
                    const res = await fetch(proxyUrl);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.chart?.result?.[0]) {
                            const quotes = data.chart.result[0].indicators.quote[0];
                            return {
                                closes: quotes.close.filter(v => v !== null),
                                volumes: quotes.volume.filter(v => v !== null)
                            };
                        }
                    }
                } catch (e) {
                    console.warn(`Yahoo proxy başarısız:`, e);
                }
            }
            
            throw new Error("Tüm veri kaynakları başarısız");
        }

        async function fetchCryptoData(symbol) {
            const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1d&limit=250`;
            const res = await fetch(url);
            if (!res.ok) throw new Error("Veri yok");
            const data = await res.json();
            return {
                closes: data.map(d => parseFloat(d[4])),
                volumes: data.map(d => parseFloat(d[5]))
            };
        }

        async function getTopCryptos() {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            const data = await res.json();
            const usdtPairs = data.filter(d => d.symbol.endsWith('USDT') && !d.symbol.includes('UP') && !d.symbol.includes('DOWN') && !d.symbol.includes('BULL') && !d.symbol.includes('BEAR'));
            usdtPairs.sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume));
            return usdtPairs.slice(0, 150).map(d => d.symbol);
        }

        // ==========================================
        // ANA TARAMA DÖNGÜSÜ
        // ==========================================
        
        let currentTab = 'bist';
        let isScanning = false;

        function switchTab(tab) {
            if (isScanning) return;
            currentTab = tab;
            document.getElementById('tab-bist').className = tab === 'bist' ? 'px-6 py-4 text-lg tab-active' : 'px-6 py-4 text-lg tab-inactive';
            document.getElementById('tab-crypto').className = tab === 'crypto' ? 'px-6 py-4 text-lg tab-active' : 'px-6 py-4 text-lg tab-inactive';
            document.getElementById('resultsBody').innerHTML = '<tr><td colspan="7" class="px-4 py-12 text-center text-gray-400 italic">Taramayı başlatmak için butona tıklayın.</td></tr>';
            document.getElementById('statusText').innerText = "Hazır.";
            document.getElementById('progressContainer').classList.add('hidden');
        }

        async function startScan() {
            if (isScanning) return;
            isScanning = true;
            
            const btn = document.getElementById('scanBtn');
            const statusText = document.getElementById('statusText');
            const tbody = document.getElementById('resultsBody');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const filterOnlySignals = document.getElementById('filterSignals').checked;

            btn.disabled = true;
            btn.innerHTML = `<span class="loading-spinner"></span> Taranıyor...`;
            tbody.innerHTML = '';
            progressContainer.classList.remove('hidden');
            progressBar.style.width = '0%';

            let symbolsToScan = [];
            let assetType = '';

            try {
                if (currentTab === 'bist') {
                    symbolsToScan = BIST_ALL_STOCKS;
                    assetType = 'BIST';
                } else {
                    statusText.innerText = "Binance'den en yüksek hacimli kriptolar çekiliyor...";
                    symbolsToScan = await getTopCryptos();
                    assetType = 'Kripto';
                }
            } catch (e) {
                statusText.innerText = "Hata: " + e.message;
                resetScanState();
                return;
            }

            const total = symbolsToScan.length;
            let processed = 0;
            let successCount = 0;
            let failCount = 0;

            const CHUNK_SIZE = 4; // BIST için biraz daha hızlı

            for (let i = 0; i < total; i += CHUNK_SIZE) {
                const chunk = symbolsToScan.slice(i, i + CHUNK_SIZE);
                const promises = chunk.map(async (symbol) => {
                    statusText.innerText = `${assetType} Taranıyor: ${symbol} (${processed + 1}/${total}) | ✅${successCount} ❌${failCount}`;
                    let rowData = { symbol, assetType };
                    
                    try {
                        let data;
                        if (assetType === 'BIST') data = await fetchBISTData(symbol);
                        else data = await fetchCryptoData(symbol);

                        const closes = data.closes;
                        const volumes = data.volumes;
                        const currentPrice = closes[closes.length - 1];
                        const currentVolume = volumes[volumes.length - 1];

                        const rsi = calculateRSI(closes, 14);
                        const rsiMet = rsi !== null && rsi > 50;

                        const ma20 = calculateSMA(closes, 20);
                        const ma50 = calculateSMA(closes, 50);
                        const ma200 = calculateSMA(closes, 200);
                        const maMet = ma20 && ma50 && ma200 && (currentPrice > ma20) && (currentPrice > ma50) && (currentPrice > ma200);

                        const macdCheck = checkMACDBullishCrossBelowZero(closes);
                        const macdMet = macdCheck.met;

                        let volMet = false;
                        let volText = "N/A";
                        if (volumes.length >= 4) {
                            const avgVol = (volumes[volumes.length - 2] + volumes[volumes.length - 3] + volumes[volumes.length - 4]) / 3;
                            volMet = currentVolume > avgVol;
                            const ratio = (currentVolume / avgVol).toFixed(2);
                            volText = `${ratio}x`;
                        }

                        const allMet = rsiMet && maMet && macdMet && volMet;
                        successCount++;

                        rowData.html = `
                            <td class="px-4 py-3 font-bold text-gray-900">${symbol} <span class="text-xs text-gray-400">(${assetType})</span></td>
                            <td class="px-4 py-3 text-right font-mono">${currentPrice.toFixed(assetType === 'Kripto' ? 4 : 2)}</td>
                            <td class="px-4 py-3 text-right font-mono ${rsiMet ? 'pass' : 'fail'}">${rsi ? rsi.toFixed(1) : 'N/A'}</td>
                            <td class="px-4 py-3 text-center text-xs ${macdMet ? 'pass' : 'fail'}">${macdCheck.status}<br><span class="text-gray-400">(${macdCheck.val})</span></td>
                            <td class="px-4 py-3 text-center text-xs">
                                <span class="${currentPrice > ma20 ? 'pass' : 'fail'}">20</span> | 
                                <span class="${currentPrice > ma50 ? 'pass' : 'fail'}">50</span> | 
                                <span class="${currentPrice > ma200 ? 'pass' : 'fail'}">200</span>
                            </td>
                            <td class="px-4 py-3 text-right text-xs ${volMet ? 'pass' : 'fail'}">${volText}</td>
                            <td class="px-4 py-3 text-center font-bold ${allMet ? 'pass bg-green-50' : 'neutral'}">${allMet ? "🟢 AL" : "⚪ YOK"}</td>
                        `;
                        rowData.isSignal = allMet;
                        
                    } catch (error) {
                        failCount++;
                        rowData.html = `<td class="px-4 py-3 font-bold">${symbol}</td><td colspan="6" class="px-4 py-3 text-red-400 text-xs italic">Veri alınamadı.</td>`;
                        rowData.isSignal = false;
                    }
                    return rowData;
                });

                const chunkResults = await Promise.all(promises);
                
                chunkResults.forEach(r => {
                    if (filterOnlySignals && !r.isSignal) return;
                    const tr = document.createElement('tr');
                    tr.className = `border-b hover:bg-gray-50 ${r.isSignal ? 'signal-row' : ''}`;
                    tr.innerHTML = r.html;
                    tbody.appendChild(tr);
                });

                processed += chunk.length;
                progressBar.style.width = `${(processed / total) * 100}%`;
                
                // Rate limit için kısa bekleme
                await new Promise(r => setTimeout(r, 250));
            }

            statusText.innerText = `✅ Tarama tamamlandı. (${total} varlık | ${successCount} başarılı, ${failCount} başarısız)`;
            resetScanState();
        }

        function resetScanState() {
            isScanning = false;
            const btn = document.getElementById('scanBtn');
            btn.disabled = false;
            btn.innerHTML = `<span>🔍 Taramayı Başlat</span>`;
        }

        document.getElementById('filterSignals').addEventListener('change', () => {
             if(!isScanning) alert("Filtreyi uygulamak için lütfen taramayı tekrar başlatın.");
        });
    </script>
